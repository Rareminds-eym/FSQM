name: Deploy FSQM to EC2 on production push

on:
  push:
    branches:
      - production

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Create .env file
        run: |
          echo "VITE_SUPABASE_URL=https://heatlbebbupsaqqwwkrq.supabase.co" >> .env
          echo "VITE_SUPABASE_ANON_KEY=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhlYXRsYmViYnVwc2FxcXd3a3JxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTM4Njc4NTIsImV4cCI6MjA2OTQ0Mzg1Mn0.YSOx0r4W64oP1Ky7iwTMOnzc6Bir0YF7vNLfXEPURbo" >> .env

      - name: Install dependencies
        run: npm install

      - name: Build React app
        run: npm run build

      - name: Archive build folder into tar
        run: tar -czf build.tar.gz -C dist .

      - name: Upload tar to EC2
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "build.tar.gz"
          target: "/home/ubuntu"

      - name: Extract and move FSQM build with sudo
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            mkdir -p /home/ubuntu/fsqm-temp
            tar -xzf /home/ubuntu/build.tar.gz -C /home/ubuntu/fsqm-temp
            sudo rm -rf /var/www/fsqm/*
            sudo mv /home/ubuntu/fsqm-temp/* /var/www/fsqm/
            rm -rf /home/ubuntu/build.tar.gz /home/ubuntu/fsqm-temp
